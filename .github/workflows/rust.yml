# rust.yml
#
# github workflows action file for super-speedy-syslog-searcher
#
# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
---
name: Rust
on:  # yamllint disable-line rule:truthy
  push:
    paths:
      - .github/**
      - Cargo.toml
      - Cargo.lock
      - src/**.rs
      - subprojects/**.rs
  pull_request:
    paths:
      - .github/**
      - Cargo.toml
      - Cargo.lock
      - src/**.rs
      - subprojects/**.rs
      - benches/**
  workflow_dispatch:  # yamllint disable-line rule:empty-values
env:
  CARGO_TERM_COLOR: always
  S4_BUILD_PRINT: 1
  S4_BUILD_REGEX_PRINT: 1
  RUST_BACKTRACE: 1
  # MSRV
  # default rust version
  # should match first value in matrix.msrv
  MSRV_UPLOAD: 1.88.0
  # MSRV
  # rust version for llvm_cov job
  # should be equal or greater than $MSRV_UPLOAD
  VERSION_LLVM_COV: 1.88.0
  # version of flamegraph which is often using latest rust
  # so a specific version must be installed for the current MSRV
  FLAMEGRAPH_VERSION: "0.6.13"
  # run options for debug
  S4_ARGSD: -s
  # run options for release
  S4_ARGSR: -s
  S4R: ./s4_release
  S4D: ./s4_debug
  # run files
  S4_TEST_FILES: \
    ./logs/CentOS9/x86_64/wtmp
    ./logs/other/tests/dtf2-2.log
    ./logs/other/tests/dtf3-2a.log
    ./logs/other/tests/dtf5-6a.log.gz
    ./logs/other/tests/dtf5-6b.UTF-16BE_BOM.log
    ./logs/other/tests/dtf5-6b.UTF-16BE_BOM.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-16BE_BOM.log.gz
    ./logs/other/tests/dtf5-6b.UTF-16BE_BOM.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-16BE_BOM.log.xz
    ./logs/other/tests/dtf5-6b.UTF-16BE_BOM.tar
    ./logs/other/tests/dtf5-6b.UTF-16BE.log
    ./logs/other/tests/dtf5-6b.UTF-16BE.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-16BE.log.gz
    ./logs/other/tests/dtf5-6b.UTF-16BE.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-16BE.log.xz
    ./logs/other/tests/dtf5-6b.UTF-16BE.tar
    ./logs/other/tests/dtf5-6b.UTF-16LE.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-16LE.log.gz
    ./logs/other/tests/dtf5-6b.UTF-16LE.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-16LE.log.xz
    ./logs/other/tests/dtf5-6b.UTF-16LE.bar
    ./logs/other/tests/dtf5-6b.UTF-16LE_BOM.log
    ./logs/other/tests/dtf5-6b.UTF-16LE_BOM.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-16LE_BOM.log.gz
    ./logs/other/tests/dtf5-6b.UTF-16LE_BOM.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-16LE_BOM.log.xz
    ./logs/other/tests/dtf5-6b.UTF-16LE_BOM.tar
    ./logs/other/tests/dtf5-6b.UTF-32BE_BOM.log
    ./logs/other/tests/dtf5-6b.UTF-32BE_BOM.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-32BE_BOM.log.gz
    ./logs/other/tests/dtf5-6b.UTF-32BE_BOM.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-32BE_BOM.log.xz
    ./logs/other/tests/dtf5-6b.UTF-32BE_BOM.tar
    ./logs/other/tests/dtf5-6b.UTF-32BE.log
    ./logs/other/tests/dtf5-6b.UTF-32BE.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-32BE.log.gz
    ./logs/other/tests/dtf5-6b.UTF-32BE.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-32BE.log.xz
    ./logs/other/tests/dtf5-6b.UTF-32BE.tar
    ./logs/other/tests/dtf5-6b.UTF-32LE_BOM.log
    ./logs/other/tests/dtf5-6b.UTF-32LE_BOM.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-32LE_BOM.log.gz
    ./logs/other/tests/dtf5-6b.UTF-32LE_BOM.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-32LE_BOM.log.xz
    ./logs/other/tests/dtf5-6b.UTF-32LE_BOM.tar
    ./logs/other/tests/dtf5-6b.UTF-32LE.log
    ./logs/other/tests/dtf5-6b.UTF-32LE.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-32LE.log.gz
    ./logs/other/tests/dtf5-6b.UTF-32LE.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-32LE.log.xz
    ./logs/other/tests/dtf5-6b.UTF-32LE.tar
    ./logs/other/tests/dtf5-6b.UTF-8_BOM.log
    ./logs/other/tests/dtf5-6b.UTF-8_BOM.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-8_BOM.log.gz
    ./logs/other/tests/dtf5-6b.UTF-8_BOM.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-8_BOM.log.xz
    ./logs/other/tests/dtf5-6b.UTF-8_BOM.tar
    ./logs/other/tests/dtf5-6b.UTF-8.log
    ./logs/other/tests/dtf5-6b.UTF-8.log.bz2
    ./logs/other/tests/dtf5-6b.UTF-8.log.gz
    ./logs/other/tests/dtf5-6b.UTF-8.log.lz4
    ./logs/other/tests/dtf5-6b.UTF-8.log.xz
    ./logs/other/tests/dtf5-6b.UTF-8.tar
    ./logs/other/tests/dtf7-20-LEVELS.log.xz
    ./logs/other/tests/gen-2-1.tar
    ./logs/other/tests/gen-20-1-faces.log
    ./logs/other/tests/gen-20-1-⚀⚁⚂⚃⚄⚅.log
    ./logs/other/tests/gen-20-2-2-faces.log
    ./logs/programs/Event_Trace_Log/waasmedic.20251005_113019_195.etl
    ./logs/programs/evtx/Microsoft-Windows-Kernel-PnP__Configuration.evtx
    ./logs/programs/journal/RHE_91_system.journal
    ./logs/programs/journal/RHE_91_system.journal.gz
    ./logs/programs/OneDrive/Local/Microsoft/OneDrive/logs/Common/FileCoAuth-2025-12-21.1214.4056.1.odl
    ./logs/programs/strace/strace-unix,us_ls.out
    ./logs/programs/utmp/host-entry6.wtmp
    ./logs/programs/utmp/host-entry6.wtmp.bz2
    ./logs/programs/utmp/host-entry6.wtmp.gz
    ./logs/programs/utmp/host-entry6.wtmp.lz4
    ./logs/programs/utmp/host-entry6.wtmp.tar
    ./logs/programs/utmp/host-entry6.wtmp.xz
    ./logs/standards/ctime.log
    ./logs/standards/ISO8601-Date-Extend.log
    ./logs/standards/ISO8601-Date-Ordinal.log
    ./logs/standards/ISO8601-Date-Week.log
    ./logs/standards/ISO8601-YY-MM-DD.log
    ./logs/standards/ISO8601-YYYYDDMMTHHMM.log
    ./logs/standards/ISO8601-YYYYDDMMTHHMMSS.log
    ./logs/standards/ISO8601-YYYYMM.log
    ./logs/standards/ISO8601-YYYYMMDD.log
    ./logs/standards/ISO8601-YYYY-DD-MMTHH-MM-SS.log
    ./logs/standards/ISO8601-YYYY-DDD.log
    ./logs/standards/ISO8601-YYYY-MM-DD.log
    ./logs/standards/RFC-2822.log
    ./logs/standards/RFC-3164.log
    ./logs/standards/RFC-5424-2dot-0400.log
    ./logs/standards/RFC-5424-2dotZ.log
    ./logs/standards/RFC-5424-3dotZ.log
    ./logs/standards/RFC-5424-6dot-0700.log
    ./logs/standards/Unix-ms.log
    ./logs/standards/W3C-DTF.log

jobs:

  job_rust_msrv_os:
    # this job downloads and builds dependency crates
    name: build ${{ matrix.msrv }} on ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # MSRV
        # first `msrv` should match Cargo.toml:[package]:rust-version
        # add a few more for sanity checks (you might be surprised)
        # concise listing at https://releases.rs/
        msrv: [
          "1.88.0",  # MSRV
          "1.90.0",
          "1.94.1",
        ]
        exclude:
          # for mac and windows, only run MSRV
          - os: macos-latest
            msrv: "1.90.0"
          - os: macos-latest
            msrv: "1.94.1"
          - os: windows-latest
            msrv: "1.90.0"
          - os: windows-latest
            msrv: "1.94.1"
    runs-on: ${{ matrix.os }}
    steps:
      # Issue #62: `git config` to workaround `git checkout` error on Windows
      - name: git config line endings
        run: |
          git config --global core.eol lf
          git config --global core.autocrlf false
          git config --global core.protectNTFS false
      - uses: actions/checkout@v7
      # TODO: use `https://github.com/actions-rust-lang/setup-rust-toolchain`?
      #       why did I stop using it?
      - run: rustup toolchain install ${{ matrix.msrv }} --profile minimal
      - name: print default-target
        shell: bash
        run: |
          set -eux
          cargo install --locked default-target
          ~/.cargo/bin/default-target
      - name: Build rust ${{ matrix.msrv }} on ${{ matrix.os }} --profile release
        shell: bash
        run: |
          set -eux
          export CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=true
          export S4_BUILD_REGEX=1
          cargo --version
          rustc --print cfg
          cargo build --locked --profile release
          ./target/release/s4 --version
      - name: Build rust ${{ matrix.msrv }} on ${{ matrix.os }} --profile dev
        shell: bash
        run: |
          set -eux
          export CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=true
          export S4_BUILD_REGEX=1
          cargo build --locked --profile dev
          ./target/debug/s4 --version
      - name: Build rust ${{ matrix.msrv }} on ${{ matrix.os }} --profile mimalloc
        shell: bash
        run: |
          set -eux
          export CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=true
          export S4_BUILD_REGEX=1
          cargo build --locked --profile mimalloc --features mimalloc
          ./target/mimalloc/s4 --version
      - name: Build rust ${{ matrix.msrv }} on ${{ matrix.os }} --profile rpmalloc
        shell: bash
        run: |
          set -eux
          export CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=true
          export S4_BUILD_REGEX=1
          cargo build --locked --profile rpmalloc --features rpmalloc
          ./target/rpmalloc/s4 --version
      - name: Build rust ${{ matrix.msrv }} on ${{ matrix.os }} --profile jemalloc
        shell: bash
        # jemalloc builds fails on github Windows
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          set -eux
          export CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=true
          export S4_BUILD_REGEX=1
          cargo build --locked --profile jemalloc --features jemalloc
          ./target/jemalloc/s4 --version
      # skip tcmalloc as it requires too particular installed libraries
      - name: Build rust ${{ matrix.msrv }} on ${{ matrix.os }} --profile alloc_tracker
        shell: bash
        run: |
          set -eux
          export S4_BUILD_REGEX=79
          export RUST_MIN_STACK=15000000  # 15 MB
          cargo build --locked --profile alloc_tracker --features alloc_tracker
          export S4_ALLOC_TRACKER_PRINT=1
          ./target/alloc_tracker/s4 --version
          export S4_ALLOC_TRACKER_PRINT=0
          ./target/alloc_tracker/s4 ./logs/other/tests/dtf2-2.log
      - name: Build rust ${{ matrix.msrv }} on ${{ matrix.os }} --profile flamegraph
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          set -eux
          export S4_BUILD_REGEX=1
          RUSTFLAGS=-g cargo build --profile flamegraph
          ./target/flamegraph/s4 --version

  job_build_debug_release:
    # this job downloads and builds dependency crates
    name: build debug and release, upload
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      # build & upload debug
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - name: Build Debug using toolchain ${{ env.MSRV_UPLOAD }}, all regex
        shell: bash
        run: |
          set -eux
          cargo --version
          cargo build --locked --verbose
          cp -av ./target/debug/s4 ${S4D}
          chmod -v 0555 ${S4D}
          ${S4D} --version
      - name: Upload debug binary for test
        uses: actions/upload-artifact@v7
        with:
          name: s4_debug
          path: ./s4_debug
      # build & upload release
      - name: Build Release using toolchain ${{ env.MSRV_UPLOAD }}, all regex
        shell: bash
        run: |
          set -eux
          cargo --version
          # build the non-optimized release because the optimize step during the --release build
          # is too long for GitHub Actions; the Github Runner times out
          cargo build --locked --profile release_Opt0
          cp -av ./target/release_Opt0/s4 ${S4R}
          chmod -v 0555 ${S4R}
          ${S4R} --version
      - name: Upload release binary for test
        uses: actions/upload-artifact@v7
        with:
          name: s4_release
          path: ./s4_release

  job_cross_targets:
    name: cross ${{ matrix.target }} on ubuntu-latest
    needs: [job_rust_msrv_os]
    strategy:
      matrix:
        target:
          # pre-test these using ./tools/cross-builds.sh
          # Tier 1
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
          # Tier 2
          - aarch64-unknown-linux-musl
          - arm-linux-androideabi
          - arm-unknown-linux-gnueabi
          - arm-unknown-linux-gnueabihf
          - armv7-linux-androideabi
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - riscv64gc-unknown-linux-gnu
          - s390x-unknown-linux-gnu
          - thumbv7neon-linux-androideabi
          - x86_64-unknown-freebsd
          - x86_64-unknown-illumos
          - x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --target ${{ matrix.target }} --profile minimal
      - run: rustup target add ${{ matrix.target }}
      - run: cargo install --locked cross
      - name: cross check ${{ matrix.target }}
        shell: bash
        run: |
          set -eux
          cargo --version
          uname -a
          rustup show
          cross --version
          # force S4_BUILD_REGEX=1 because env. vars. are not passed by `cross` into
          # the docker instance.
          echo 1 | tee ./subprojects/ere/ere_datetimes_impl/S4_BUILD_REGEX S4_BUILD_REGEX
          cross check --locked --lib --bins --release --target ${{ matrix.target }}

  job_check:
    # this job downloads and builds dependency crates
    name: check
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - name: Check (cargo check --all-targets)
        shell: bash
        # `cargo check` builds dependences and other things but skips
        # final code generation
        run: |
          set -eux
          cargo --version
          rustup default ${{ env.MSRV_UPLOAD }}
          cargo --version
          export S4_BUILD_REGEX=1
          cargo check --locked --all-targets
          cargo check --locked --all-targets --release

  job_deny:
    name: cargo deny
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - run: cargo install --locked cargo-deny
      - name: Deny (cargo-deny.sh)
        shell: bash
        run: ./tools/cargo-deny.sh
        continue-on-error: true

  job_clippy:
    # this job downloads and builds dependency crates
    name: clippy
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile default
      - name: cargo clippy
        shell: bash
        run: |
          set -eux
          cargo --version
          cargo clippy --version
          export S4_BUILD_REGEX=1
          cargo clippy --locked --no-deps --all-targets --all-features

  job_bench:
    # this job downloads and builds dependency crates
    name: bench
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - name: Benches (cargo bench --no-run)
        shell: bash
        run: |
          set -eux
          cargo --version
          export S4_BUILD_REGEX=1
          cargo bench --locked --no-run --features bench_jetscii,bench_memchr,bench_stringzilla

  job_test_linux:
    # this job downloads and builds dependency crates
    name: test Linux
    needs: [job_rust_msrv_os, job_build_debug_release]
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - run: cargo install --locked cargo-nextest
      - name: Install libsystemd
        shell: bash
        run: |
          set -eux
          chmod -v +x ./.github/tools/install-libsystemd.sh
          ./.github/tools/install-libsystemd.sh
      - name: set log file filesystem Modified Times
        shell: bash
        run: |
          set -eux
          chmod -v +x ./tools/log-files-time-update.sh
          ./tools/log-files-time-update.sh
      - name: test ere
        shell: bash
        run: |
          set -eux
          cd ./subprojects/ere/ere
          cargo test --features unstable-attr-regex --locked
      - name: test ere-core
        shell: bash
        run: |
          set -eux
          cd ./subprojects/ere/ere-core
          cargo test --locked
      # download release for --venv
      - name: Download release binary
        uses: actions/download-artifact@v8
        with:
          name: s4_release
      - name: create venv
        shell: bash
        run: |
          set -eux
          which python
          python --version
          chmod +x ${S4R}
          ${S4R} --venv
      - name: nextest (all)
        shell: bash
        run: |
          set -eux
          cargo nextest --version
          export NEXTEST_TEST_THREADS=1
          cargo nextest run --locked --bins --lib --no-fail-fast --final-status-level=fail

  job_test_macos:
    name: test Mac
    needs: [job_rust_msrv_os]
    runs-on: macos-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - run: cargo install --locked cargo-nextest
      # XXX: MacOS tools do not support `touch` arguments run in
      #      `./tools/log-files-time-update.sh`. So skip running `log-files-time-update.sh`
      #      See https://stackoverflow.com/q/78540977/471376
      - name: create venv
        shell: bash
        run: |
          set -eux
          export S4_BUILD_REGEX=1
          cargo build --locked --profile release_Opt0
          which python
          python --version
          ./target/release_Opt0/s4 --venv
      - name: nextest (all)
        shell: bash
        run: |
          set -eux
          cargo nextest --version
          export S4_BUILD_REGEX=TEST
          export NEXTEST_TEST_THREADS=1
          cargo nextest run --locked --bins --lib --no-fail-fast --final-status-level=fail

  job_test_windows:
    name: test Windows
    needs: [job_rust_msrv_os]
    runs-on: windows-latest
    steps:
      - name: git config line endings
        run: |
          # force git to not manipulate line endings. Otherwise some test cases
          # that read in-repository files will have byte differences and fail.
          git config --global core.eol lf
          git config --global core.autocrlf false
          git config --global core.protectNTFS false
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - name: set log file filesystem Modified Times
        shell: powershell
        run: |
          .\tools\log-files-time-update.ps1
      - name: create venv
        shell: powershell
        run: |
          Set-PSDebug -Trace 1
          ${env:S4_BUILD_REGEX}="1"
          cargo.exe build --locked --profile release_Opt0
          Get-Command -All python.exe
          python.exe --version
          ./target/release_Opt0/s4 --venv
      - name: test (all)
        shell: powershell
        run: |
          Set-PSDebug -Trace 1
          ${env:S4_BUILD_REGEX}="TEST"
          # XXX: do not use nextest as it is buggy on Windows
          #      see Issue #218
          cargo.exe test --locked --bins --lib --no-fail-fast

  job_doc_publish:
    # this job downloads and builds dependency crates
    name: doc, publish
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    env:
      S4_BUILD_REGEX: 1
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - name: Build Documentation
        run: cargo doc --locked --release --no-deps -v
      - uses: dtolnay/rust-toolchain@nightly
      - uses: dtolnay/install@cargo-docs-rs
      - name: Build documentation for docs.rs (cargo docs-rs)
        run: cargo rustdoc --locked
      - name: Publish to crates.io; dry run (cargo package --dry-run)
        shell: bash
        continue-on-error: true
        run: |
          set -eux
          cargo publish --locked --dry-run
          cargo package --list --all-features
          cargo package --locked

  job_yamllint:
    # this job installs Python PIP packages
    name: yamllint
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - name: Use Python 3.10
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          set -eux
          python --version
          python -m pip \
            --disable-pip-version-check \
            --no-python-version-warning \
            --version
          python -m pip install \
            --disable-pip-version-check \
            --no-python-version-warning \
            --no-color \
            yamllint==1.35.1
          python -m pip list \
            --disable-pip-version-check \
            --no-python-version-warning \
            -v -v
      - name: Run yamllint.sh
        run: PYTHON=python ./tools/yamllint.sh --format github

  job_easy_install:
    name: easy_install
    needs: [job_rust_msrv_os]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      # this should be *last* released version
      S4_VERSION: 0.9.81
    runs-on: ${{ matrix.os }}
    steps:
      - name: s4-easy-install.sh
        if: ${{matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'}}
        shell: bash
        run: |
          set -euxo pipefail
          curl -LsSf 'https://raw.githubusercontent.com/jtmoon79/super-speedy-syslog-searcher/main/tools/s4-easy-install.sh' | \
            VER=${{ env.S4_VERSION }} sh -x
      - name: s4-easy-install.ps1
        if: ${{matrix.os == 'windows-latest'}}
        shell: pwsh
        run: |
          Set-PSDebug -Trace 1
          Set-ExecutionPolicy -ExecutionPolicy Unrestricted -Scope Process
          Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/jtmoon79/super-speedy-syslog-searcher/main/tools/s4-easy-install.ps1' `
            -OutFile s4-easy-install.ps1
          .\s4-easy-install.ps1 -Version ${{ env.S4_VERSION }} -trace

  job_codecov_validate:
    name: codecov validate
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - name: Run codecov-validate.sh
        run: ./tools/codecov-validate.sh -v

  job_markup_link_checker:
    name: markup link checker
    needs: [job_rust_msrv_os]
    runs-on: ubuntu-latest
    steps:
      - name: Markup Link Checker (mlc)
        uses: becheran/mlc@v1.2.0
        with:
          args: ./README.md

  job_runs:
    # all of these steps need the s4 binary and the git-committed logs
    # with modified filesystem datetime
    name: run s4
    needs: job_build_debug_release
    runs-on: ubuntu-latest
    steps:
      # checkout for the log files
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.MSRV_UPLOAD }} --profile minimal
      - name: set log file filesystem Modified Times
        shell: bash
        run: |
          set -eux
          chmod -v +x ./tools/log-files-time-update.sh
          ./tools/log-files-time-update.sh
      - name: Install libsystemd
        shell: bash
        run: |
          set -eux
          chmod -v +x ./.github/tools/install-libsystemd.sh
          ./.github/tools/install-libsystemd.sh
      # download debug
      - name: Download debug binary
        uses: actions/download-artifact@v8
        with:
          name: s4_debug
      # download release
      - name: Download release binary
        uses: actions/download-artifact@v8
        with:
          name: s4_release
      # set mode
      - name: chmod +x s4_debug s4_release
        shell: bash
        run: |
          set -eux
          chmod -v +x ${S4R} ${S4D}
          find ./tools -name '*.sh' -type f -exec chmod -v +x {} \;
      #
      # run debug
      #
      - name: s4_debug --help
        shell: bash
        run: |
          set -eux
          ${S4D} --version
          ${S4D} --help
      - name: s4_debug --venv
        shell: bash
        run: |
          set -eux
          sudo apt install python3
          which python3
          python3 --version
          ${S4D} --venv
      - shell: bash
        run: ${S4D} -cn ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -cn ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -cn -l -n -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -cn -l -p -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -cn -u -n -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -cn -u -p -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -ca -l -n -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -ca -l -p -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -ca -u -n -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} ${S4_ARGSD} -ca -u -p -w ${S4_TEST_FILES} 2>/dev/null
      - shell: bash
        run: ${S4D} -s -cn -l -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -cn -l -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -cn -u -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -cn -u -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -ca -l -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -ca -l -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -ca -u -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -ca -u -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4D} -s -ca --light-theme -u -p -w ${S4_TEST_FILES} &>/dev/null
      - name: s4_debug | grep
        shell: bash
        run: |
          set -euxo pipefail
          ${S4D} -cn -u -p -w ${S4_TEST_FILES} | grep -qFe '6b-abcd'
      - name: S4_FILE_HANDLE_OPEN_MAX=2 s4_debug -s S4_ARGSD S4_TEST_FILES
        shell: bash
        run: |
          set -eux
          export S4_FILE_HANDLE_OPEN_MAX=2
          ${S4D} -s ${S4_TEST_FILES} &>/dev/null
      - name: ulimit=20 s4_debug -s S4_TEST_FILES
        shell: bash
        run: |
          set -eux
          ulimit -n 20
          ${S4D} -s ./logs/other/tests/dtf5-6b* ${S4_TEST_FILES} &>/dev/null
      #
      # run release
      #
      - name: s4_release --help
        shell: bash
        run: |
          set -eux
          ${S4R} --version
          ${S4R} --help
      - name: s4_release --venv
        shell: bash
        run: |
          set -eux
          which python3
          python3 --version
          ${S4R} --venv
      - shell: bash
        run: ${S4R} -cn ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -cn ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -cn -l -n -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -cn -l -p -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -cn -u -n -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -cn -u -p -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -ca -l -n -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -ca -l -p -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -ca -u -n -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} ${S4_ARGSR} -ca -u -p -w ${S4_TEST_FILES}
      - shell: bash
        run: ${S4R} -s -cn ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -cn -l -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -cn -l -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -cn -u -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -cn -u -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -ca -l -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -ca -l -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -ca -u -n -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -ca -u -p -w ${S4_TEST_FILES} &>/dev/null
      - shell: bash
        run: ${S4R} -s -ca --light-theme -u -p -w ${S4_TEST_FILES} &>/dev/null
      - name: s4_release | grep
        shell: bash
        run: |
          set -euxo pipefail
          ${S4R} -cn -u -p -w ${S4_TEST_FILES} | grep -qFe '6b-abcd'
      - name: S4_FILE_HANDLE_OPEN_MAX=2 s4_release -s S4_TEST_FILES
        shell: bash
        run: |
          set -eux
          export S4_FILE_HANDLE_OPEN_MAX=2
          ${S4R} -s ${S4_TEST_FILES} &>/dev/null
      - name: ulimit=20 s4_release -s S4_TEST_FILES
        shell: bash
        run: |
          set -eux
          ulimit -n 20
          ${S4R} -s ./logs/other/tests/dtf5-6b* ${S4_TEST_FILES} &>/dev/null
      #
      # compare debug release
      #
      - name: compare-debug-release.sh
        shell: bash
        run: |
          set -eux
          export PROGRAM_A=${S4R}
          export PROGRAM_B=${S4D}
          ./tools/compare-debug-release.sh
      #
      # compare grep sort
      #
      - name: compare-grep-sort.sh
        shell: bash
        run: |
          set -eux
          export PROGRAM=${S4R}
          ./tools/compare-grep-sort.sh
      #
      # compare current and expected
      #
      - name: compare-current-and-expected
        shell: bash
        run: |
          set -eux
          export PROGRAM=${S4R}
          ./tools/compare-current-and-expected/compare.sh
      #
      # compare cat
      #
      - name: compare-cat
        shell: bash
        run: |
          set -eux
          export PROGRAM=${S4R}
          ./tools/compare-cat.sh

  # Run code coverage using cargo-llvm-cov then upload to coveralls.io
  job_code_coverage_llvm:
    name: llvm_cov
    runs-on: ubuntu-latest
    needs: [job_runs, job_test_linux]
    env:
      COVERALLS_FILE: ./coveralls.lcov
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ env.VERSION_LLVM_COV }} --profile minimal
      - name: Install libsystemd
        shell: bash
        run: |
          set -eux
          chmod -v +x ./.github/tools/install-libsystemd.sh
          ./.github/tools/install-libsystemd.sh
      - name: Install lcov
        run: sudo apt-get install --yes lcov
      - run: rustup component add llvm-tools-preview
      - run: cargo install --locked cargo-llvm-cov
      - name: set log file filesystem Modified Times
        shell: bash
        run: |
          set -eux
          chmod -v +x ./tools/log-files-time-update.sh
          ./tools/log-files-time-update.sh
      - name: run llvm-cov
        shell: bash
        run: |
          set -eux
          chmod -v +x ./tools/cargo-llvm-cov-combine-multiple.sh
          cargo llvm-cov --version
          cargo llvm-cov show-env
          export S4_BUILD_REGEX=TEST
          export LCOV_OUTPUT_SUMMARY=${COVERALLS_FILE}
          ./tools/cargo-llvm-cov-combine-multiple.sh
          ls -l "${COVERALLS_FILE}"
      - name: upload coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          file: ${{ env.COVERALLS_FILE }}
          format: lcov
...
